<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Cover - ZZSP Zgierz</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #1E293B;
            -webkit-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
        }

        .fb-cover {
            width: 820px;
            height: 312px;
            position: relative;
            overflow: hidden;
            background: 
                radial-gradient(ellipse at center, #2F6A81 0%, #2F6A81 40%, #2F6A81 70%, #2F6A81 90%);
        }

        /* Subtle geometric shapes pattern - large shapes */
        .fb-cover::before {
            content: '';
            position: absolute;
            top: -60px;
            left: -40px;
            width: 220px;
            height: 220px;
            border: 2px solid rgba(255, 255, 255, 0.06);
            border-radius: 50%;
            z-index: 2;
            pointer-events: none;
        }

        /* Subtle accent glow */
        .fb-cover::after {
            content: '';
            position: absolute;
            bottom: -90px;
            right: 120px;
            width: 260px;
            height: 260px;
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            transform: rotate(25deg);
            z-index: 2;
            pointer-events: none;
        }

        /* Decorative background shapes */
        .bg-shape {
            position: absolute;
            pointer-events: none;
            z-index: 2;
        }

        .bg-shape-1 {
            top: -40px;
            right: -50px;
            width: 200px;
            height: 200px;
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-radius: 50%;
        }

        .bg-shape-2 {
            bottom: -70px;
            left: 160px;
            width: 180px;
            height: 180px;
            border: 2px solid rgba(6, 182, 212, 0.08);
            border-radius: 50%;
        }

        .bg-shape-3 {
            top: 30px;
            right: 250px;
            width: 100px;
            height: 100px;
            border: 1.5px solid rgba(255, 255, 255, 0.04);
            border-radius: 20px;
            transform: rotate(15deg);
        }

        .bg-shape-4 {
            bottom: -30px;
            left: -30px;
            width: 140px;
            height: 140px;
            border: 1.5px solid rgba(249, 115, 22, 0.07);
            border-radius: 24px;
            transform: rotate(-12deg);
        }

        .bg-shape-5 {
            top: -20px;
            left: 400px;
            width: 80px;
            height: 80px;
            border: 1.5px solid rgba(255, 255, 255, 0.05);
            border-radius: 50%;
        }

        .bg-shape-6 {
            top: 60px;
            right: -20px;
            width: 120px;
            height: 120px;
            border: 1.5px solid rgba(6, 182, 212, 0.06);
            border-radius: 50%;
        }

        .bg-shape-7 {
            bottom: 20px;
            right: 50px;
            width: 60px;
            height: 60px;
            border: 1.5px solid rgba(255, 255, 255, 0.04);
            border-radius: 14px;
            transform: rotate(35deg);
        }



        /* Main content layout */
        .content {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            height: 100%;
            padding: 30px 40px;
            gap: 30px;
        }

        /* Logo section */
        .logo-section {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-wrapper {
            width: 130px;
            height: 130px;
            background: #FFFFFF;
            border: 1px solid rgba(150, 160, 170, 0.4);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 14px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .logo-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Text section */
        .text-section {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
        }

        .school-type-label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #FFFFFF;
            background: #F97316;
            padding: 5px 14px;
            border-radius: 6px;
            width: fit-content;
            box-shadow: 0 2px 10px rgba(249, 115, 22, 0.35);
        }

        .school-name-main {
            font-size: 26px;
            font-weight: 900;
            color: #FFFFFF;
            line-height: 1.15;
            letter-spacing: -0.5px;
            text-transform: uppercase;
        }

        .school-name-main .highlight-cyan {
            color: #67E8F9;
        }

        .school-patron {
            font-size: 13px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 0.5px;
        }

        .school-units {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 2px;
        }

        .unit-tag {
            display: inline-flex;
            align-items: center;
            padding: 5px 14px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: -0.2px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            width: fit-content;
        }

        .unit-tag.tech {
            color: #FFFFFF;
            border-left: 4px solid #67E8F9;
        }

        .unit-tag.tech .special {
            font-size: 9px;
            font-weight: 600;
            color: #67E8F9;
            letter-spacing: 0px;
            text-transform: none;
            margin-left: 6px;
        }

        .unit-tag.bran {
            color: #FFFFFF;
            border-left: 4px solid #FB923C;
        }

        .unit-tag.bran .special {
            font-size: 9px;
            font-weight: 600;
            color: #FB923C;
            letter-spacing: 0px;
            text-transform: none;
            margin-left: 6px;
        }

        /* Right side - school directions icons */
        .directions-section {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: flex-end;
        }

        .direction-row {
            display: flex;
            gap: 8px;
        }

        .direction-icon {
            width: 52px;
            height: 52px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .direction-icon.cyan {
            background: rgba(6, 182, 212, 0.15);
            color: #67E8F9;
        }

        .direction-icon.teal {
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.85);
        }

        .direction-icon.orange {
            background: rgba(249, 115, 22, 0.15);
            color: #FB923C;
        }

        .direction-icon .icon-label {
            display: none;
        }

        .direction-icon .icon-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }



        /* Print styles */
        @media print {
            body {
                background: #FFFFFF;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            .fb-cover {
                background-color: #134659 !important;
            }

            .logo-wrapper {
                background: #FFFFFF !important;
                box-shadow: none !important;
                border: 1px solid rgba(255, 255, 255, 0.3) !important;
            }

            .unit-tag {
                background: rgba(255, 255, 255, 0.1) !important;
                box-shadow: none !important;
                border: 1px solid rgba(255, 255, 255, 0.15) !important;
            }

            .unit-tag.tech {
                border-left: 4px solid #67E8F9 !important;
            }

            .unit-tag.bran {
                border-left: 4px solid #FB923C !important;
            }

            .school-type-label {
                background: #F97316 !important;
                color: #FFFFFF !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            .direction-icon {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                box-shadow: none !important;
                border: 1px solid rgba(255, 255, 255, 0.15) !important;
            }
        }
    </style>
</head>

<body>
    <div class="fb-cover">
        <!-- Background shapes -->
        <div class="bg-shape bg-shape-1"></div>
        <div class="bg-shape bg-shape-2"></div>
        <div class="bg-shape bg-shape-3"></div>
        <div class="bg-shape bg-shape-4"></div>
        <div class="bg-shape bg-shape-5"></div>
        <div class="bg-shape bg-shape-6"></div>
        <div class="bg-shape bg-shape-7"></div>

        <!-- Main content -->
        <div class="content">
            <!-- Logo -->
            <div class="logo-section">
                <div class="logo-wrapper">
                    <img src="assets/logozzsp_1_orig.png" alt="Logo ZZSP Zgierz">
                </div>
            </div>

            <!-- School name and tags -->
            <div class="text-section">
                <span class="school-type-label">Rekrutacja 2026/2027</span>

                <h1 class="school-name-main">
                    <span class="highlight-cyan">Zgierski</span> Zespół Szkół<br>
                    Ponadpodstawowych
                </h1>

                <p class="school-patron" style="margin-top: -6px;">im. Jana Pawła II</p>

                <div class="school-units">
                    <div class="unit-tag tech">
                        Technikum Innowacji <span class="special">z Oddziałami Dwujęzycznymi</span>
                    </div>
                    <div class="unit-tag bran">
                        Szkoły Branżowe <span class="special">I i II Stopnia</span>
                    </div>
                </div>
            </div>

            <!-- School directions icons -->
            <div class="directions-section">
                <div class="direction-row">
                    <div class="direction-icon cyan">
                        <div class="icon-content">
                            <i class="bi bi-laptop"></i>
                        </div>
                    </div>
                    <div class="direction-icon teal">
                        <div class="icon-content">
                            <i class="bi bi-code-slash"></i>
                        </div>
                    </div>
                    <div class="direction-icon orange">
                        <div class="icon-content">
                            <i class="bi bi-robot"></i>
                        </div>
                    </div>
                </div>
                <div class="direction-row">
                    <div class="direction-icon teal">
                        <div class="icon-content">
                            <i class="bi bi-lightning-charge"></i>
                        </div>
                    </div>
                    <div class="direction-icon cyan">
                        <div class="icon-content">
                            <i class="bi bi-buildings"></i>
                        </div>
                    </div>
                    <div class="direction-icon teal">
                        <div class="icon-content">
                            <i class="bi bi-sun"></i>
                        </div>
                    </div>
                </div>
                <div class="direction-row">
                    <div class="direction-icon orange">
                        <div class="icon-content">
                            <i class="bi bi-truck"></i>
                        </div>
                    </div>
                    <div class="direction-icon cyan">
                        <div class="icon-content">
                            <i class="bi bi-geo-alt"></i>
                        </div>
                    </div>
                    <div class="direction-icon orange">
                        <div class="icon-content">
                            <i class="bi bi-car-front"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>

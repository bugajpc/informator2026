<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Okładka - Informator 2026 (Druk A5)</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        @page {
            size: A5;
            margin: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #134659;
            /* Główny kolor tła dla okładki Deep Ocean */
            color: #FFFFFF;
            margin: 0 auto;
            width: 148mm;
            height: 210mm;
            padding: 0;
            box-sizing: border-box;
            overflow: hidden;
            -webkit-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
        }

        .container-a5 {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .cover-image-wrapper {
            width: 100%;
            height: 52%;
            position: relative;
        }

        .cover-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Subtle gradient overlay to blend perfectly into the dark blue bottom */
        .cover-gradient {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: linear-gradient(to bottom, rgba(19, 70, 89, 0) 0%, rgba(19, 70, 89, 1) 100%);
        }

        .content-section {
            padding: 8mm 12mm 12mm 12mm;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
            background-color: #134659;
        }

        .school-name {
            font-size: 14px;
            line-height: 1.3;
            font-weight: 800;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-bottom: 6px;
            color: #FFFFFF;
        }

        .school-subtitle {
            font-size: 12px;
            font-weight: 500;
            color: #06B6D4;
            /* Tech Cyan */
            margin-bottom: 24px;
            line-height: 1.4;
        }

        .main-title {
            font-size: 42px;
            font-weight: 800;
            letter-spacing: -1.5px;
            margin-bottom: 2px;
            color: #FFFFFF;
            text-transform: uppercase;
        }

        .year-badge {
            display: inline-block;
            background-color: #D9231D;
            /* Energy Red */
            color: #FFFFFF;
            font-weight: 800;
            font-size: 15px;
            padding: 6px 16px;
            border-radius: 4px;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        .footer-logo {
            margin-top: auto;
            font-size: 9px;
            color: rgba(255, 255, 255, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
    </style>
</head>

<body>

    <div class="container-a5">

        <div class="cover-image-wrapper">
            <img src="assets/cover_image.png" alt="Innowacyjna edukacja" class="cover-image">
            <div class="cover-gradient"></div>
        </div>

        <div class="content-section">

            <h2 class="school-name">Zgierski Zespół Szkół Ponadpodstawowych<br>im. Jana Pawła II</h2>
            <div class="school-subtitle">Technikum Innowacji i Szkoły Branżowe I i II stopnia</div>

            <h1 class="main-title">INFORMATOR</h1>
            <div class="mb-3">
                <span class="year-badge">REKRUTACJA 2026</span>
            </div>

            <div class="footer-logo">
                <i class="bi bi-mortarboard-fill" style="font-size: 14px; color: #06B6D4;"></i>
                INNOWACYJNA PRZYSZŁOŚĆ ZACZYNA SIĘ TUTAJ
            </div>

        </div>

    </div>

</body>

</html>
